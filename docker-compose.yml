version: '3.8'

services:
  radio-server:
    build:
      context: ./radio-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./archive:/app/archive
      - ./recordings:/app/recordings
    # Ensure Docker has access to ALSA host audio devices if needed.
    # Note: On macOS this may not capture host audio directly,
    # but the mock device logic should prevent crashes.
    devices:
      - /dev/snd:/dev/snd
    environment:
      - RUST_LOG=info
      - R2_ACCESS_KEY=minioadmin
      - R2_SECRET_KEY=minioadmin
      - R2_ENDPOINT=http://minio:9000
    depends_on:
      - minio

  radio-client:
    build:
      context: ./radio-client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - TOKEN_SECRET=super_secret_dev_token
      - R2_PUBLIC_URL=http://radio-server:8080/manifest.json
      - PUBLIC_R2_URL=http://localhost:9000/radio-archive
      - PUBLIC_EVENTS_URL=http://localhost:8080/events
    depends_on:
      - radio-server

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb myminio/radio-archive || true &&
      mc anonymous set public myminio/radio-archive
      "
