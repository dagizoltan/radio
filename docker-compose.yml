version: '3.8'

services:
  radio-server:
    build:
      context: ./radio-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./archive:/app/archive
      - ./recordings:/app/recordings
      - /proc/asound:/host/asound:ro
      - /etc/localtime:/etc/localtime:ro
    # Pass through all ALSA sound device nodes from the host.
    # Note: /dev/snd is bind-mounted; discovery.rs scans it for pcmC*D*c capture nodes.
    devices:
      - /dev/snd:/dev/snd
    environment:
      - RUST_LOG=info
      - R2_ACCESS_KEY=minioadmin
      - R2_SECRET_KEY=minioadmin
      - R2_ENDPOINT=http://minio:9000
      - R2_BUCKET=radio-archive
    depends_on:
      - minio

  radio-client:
    build:
      context: ./radio-client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - TOKEN_SECRET=super_secret_dev_token
      - R2_PUBLIC_URL=http://minio:9000/radio-archive/manifest.json
      - PUBLIC_R2_URL=http://localhost:9000/radio-archive
      - PUBLIC_EVENTS_URL=http://localhost:8080/events
    depends_on:
      - radio-server

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_API_CORS_ALLOW_ORIGIN=*
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " sleep 5 && mc alias set myminio http://minio:9000 minioadmin minioadmin && mc mb myminio/radio-archive || true && mc anonymous set public myminio/radio-archive "
